<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constructor de Patrones — El Desastre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #e9e5e5;
      --light: #c6cac7;
      --contrast: #979187;
      --primary: #768067;
      --text: #5c5044;
      --white: #f5f3f0;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 300; }
    a { color: inherit; text-decoration: none; }

    .top-bar { background: var(--primary); height: 36px; }

    .nav {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
      border-bottom: 1px solid var(--contrast);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.3rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-right: auto;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--contrast); }
    .nav-links a:hover { color: var(--text); }

    .page-header { padding: 3rem 2.5rem 1rem; text-align: center; }
    .page-header h1 { font-family: var(--font-display); font-size: clamp(3rem, 8vw, 6rem); font-weight: 300; color: var(--primary); }
    .page-header p { max-width: 620px; margin: 0.8rem auto 0; line-height: 1.6; }

    .selector-area {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 1rem;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 2.5rem;
    }
    .selector-box { background: var(--white); padding: 1.5rem; border-radius: 18px; border: 1px solid rgba(92,80,68,0.08); }
    .selector-box label { display: block; font-family: var(--font-display); font-size: 1.7rem; font-style: italic; font-weight: 300; margin-bottom: 0.8rem; }

    select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      padding: 0.9rem 2.8rem 0.9rem 1.2rem;
      border: 1px solid var(--contrast);
      border-radius: 999px;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1.2rem;
      font-style: italic;
      cursor: pointer;
      outline: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--primary) 50%),
        linear-gradient(135deg, var(--primary) 50%, transparent 50%);
      background-position: calc(100% - 22px) center, calc(100% - 15px) center;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
    }

    .pattern-card {
      display: none;
      max-width: 1100px;
      margin: 2rem auto 4rem;
      padding: 2rem;
      background: var(--white);
      border-radius: 22px;
      border: 1px solid var(--light);
    }
    .pattern-card.active { display: block; }

    .pattern-title { font-family: var(--font-display); font-size: 2.5rem; font-weight: 300; color: var(--primary); margin-bottom: 1.5rem; }

    .pattern-content {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2rem;
      align-items: start;
    }

    .measurements { background: var(--bg); border-radius: 18px; padding: 1.4rem; }
    .measurements h3, .preview h3 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 300; margin-bottom: 1rem; }

    .measurement-row {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 0.7rem;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    .measurement-row input {
      width: 100%;
      padding: 0.55rem;
      border: 1px solid var(--contrast);
      border-radius: 12px;
      background: var(--white);
    }

    .trace-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 22px;
      background: var(--text);
      color: var(--bg);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .trace-btn + .trace-btn { margin-top: 0.5rem; }

    .preview { background: var(--light); border-radius: 18px; padding: 1.4rem; min-height: 420px; }

    .pattern-preview {
      width: 100%;
      height: 600px;
      background: var(--white);
      border-radius: 14px;
      border: 1px dashed var(--contrast);
    }

    @media (max-width: 800px) {
      .selector-area, .pattern-content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">El Desastre</a>
    <ul class="nav-links">
      <li><a href="sobre.html">About</a></li>
      <li><a href="aprender.html">Learning</a></li>
      <li><a href="portafolio.html">Portfolio</a></li>
      <li><a href="patrones.html">Patterns</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <h1>Constructor de patrones</h1>
    <p>Selecciona una base, ingresa las medidas necesarias y traza un patrón inicial.</p>
  </header>

  <section class="selector-area">
    <div class="selector-box">
      <label for="topSelect">Prendas superiores</label>
      <select id="topSelect">
        <option value="">Seleccionar</option>
        <option value="bodice">Cuerpo básico</option>
      </select>
    </div>
    <div class="selector-box">
      <label for="bottomSelect">Prendas inferiores</label>
      <select id="bottomSelect">
        <option value="">Seleccionar</option>
        <option value="skirt">Falda básica</option>
      </select>
    </div>
  </section>

  <section id="patternCard" class="pattern-card">
    <h2 id="patternTitle" class="pattern-title">Seleccione un patrón</h2>
    <div class="pattern-content">
      <div class="measurements">
        <h3>Medidas necesarias</h3>
        <div id="measurementList"></div>
        <button class="trace-btn" onclick="drawPattern()">Trazar patrón</button>
        <button id="pdfButton" class="trace-btn" onclick="downloadPatternPDF()" style="display:none">Descargar PDF A4</button>
      </div>
      <div class="preview">
        <h3>Vista del patrón</h3>
        <svg id="patternPreview" class="pattern-preview" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid meet">
          <text x="400" y="450" text-anchor="middle" fill="#979187" font-size="20">Aquí aparecerá el patrón</text>
        </svg>
      </div>
    </div>
  </section>

  <script>
    const topSelect = document.getElementById("topSelect");
    const bottomSelect = document.getElementById("bottomSelect");
    const patternCard = document.getElementById("patternCard");
    const patternTitle = document.getElementById("patternTitle");
    const measurementList = document.getElementById("measurementList");
    const patternPreview = document.getElementById("patternPreview");

    const patterns = {
      bodice: {
        title: "Cuerpo básico",
        measurements: ["Busto", "Cintura", "Contorno de cuello"]
      },
      skirt: {
        title: "Falda básica",
        measurements: ["Contorno cintura", "Contorno cadera", "Alto cadera", "Largo total", "Pretina"]
      }
    };

    const ids = {
      "Contorno cintura": "cintura",
      "Contorno cadera": "cadera",
      "Alto cadera": "alto",
      "Largo total": "largo",
      "Pretina": "pretina"
    };

    function showPattern(type) {
      if (!type) return;
      const selectedPattern = patterns[type];
      patternCard.classList.add("active");
      patternTitle.textContent = selectedPattern.title;
      measurementList.innerHTML = "";
      document.getElementById("pdfButton").style.display = "none";
      selectedPattern.measurements.forEach((measurement) => {
        const row = document.createElement("div");
        row.className = "measurement-row";
        const inputId = ids[measurement] || measurement.toLowerCase().replaceAll(" ", "-");
        row.innerHTML = `<label>${measurement}</label><input id="${inputId}" type="number" placeholder="cm">`;
        measurementList.appendChild(row);
      });
      patternPreview.innerHTML = `<text x="400" y="450" text-anchor="middle" fill="#979187" font-size="20">Presiona "Trazar patrón"</text>`;
    }

    topSelect.addEventListener("change", function () { bottomSelect.value = ""; showPattern(this.value); });
    bottomSelect.addEventListener("change", function () { topSelect.value = ""; showPattern(this.value); });

    function drawPattern() {
      if (bottomSelect.value === "skirt") { drawSkirt(); return; }
      if (topSelect.value === "bodice") { drawBodice(); return; }
    }

    function drawSkirt() {
      const cintura = Number(document.getElementById("cintura").value);
      const cadera  = Number(document.getElementById("cadera").value);
      const alto    = Number(document.getElementById("alto").value);
      const largo   = Number(document.getElementById("largo").value);
      const pretina = Number(document.getElementById("pretina").value);

      if (!cintura || !cadera || !alto || !largo || !pretina) {
        alert("Por favor ingresa todas las medidas.");
        return;
      }

      const scale = 5;
      const seam  = 1 * scale;

      function drawDot(p) {
        return `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#768067" />`;
      }

      // ── waistband at the top ──────────────────────────────────────────
      function anatomicalWaistband() {
        const wbTop    = 30;
        const wbHeight = pretina * scale;
        const halfWaist = (cintura / 8) * scale;
        const startX   = 90;
        const pieceGap = 4;
        const baseAngle = -8;
        const dartCloseAngle = 14;

        const pieces = [
          { name: "1", width: halfWaist, angle: baseAngle },
          { name: "2", width: halfWaist, angle: baseAngle + dartCloseAngle },
          { name: "3", width: halfWaist, angle: baseAngle + dartCloseAngle * 1.6 },
          { name: "4", width: halfWaist, angle: baseAngle + dartCloseAngle * 2.2 }
        ];

        function degToRad(deg) { return deg * Math.PI / 180; }

        function rotatePoint(px, py, originX, originY, angleDeg) {
          const angle = degToRad(angleDeg);
          const dx = px - originX;
          const dy = py - originY;
          return {
            x: originX + dx * Math.cos(angle) - dy * Math.sin(angle),
            y: originY + dx * Math.sin(angle) + dy * Math.cos(angle)
          };
        }

        function drawPiece(x, y, width, height, angle, name) {
          // upside down: seam edge at top, waist edge at bottom
          const origin = { x, y: y + height };

          const p1 = { x: x,         y: y + height }; // bottom-left  (waist)
          const p2 = { x: x + width, y: y + height }; // bottom-right (waist)
          const p3 = { x: x + width, y: y };          // top-right    (seam)
          const p4 = { x: x,         y: y };          // top-left     (seam)

          const r = (pt) => rotatePoint(pt.x, pt.y, origin.x, origin.y, angle);
          const rp1 = r(p1), rp2 = r(p2), rp3 = r(p3), rp4 = r(p4);

          const labelX = (rp1.x + rp2.x + rp3.x + rp4.x) / 4;
          const labelY = (rp1.y + rp2.y + rp3.y + rp4.y) / 4;

          const s = seam;
          const s1 = r({ x: x - s,         y: y + height + s });
          const s2 = r({ x: x + width + s,  y: y + height + s });
          const s3 = r({ x: x + width + s,  y: y - s });
          const s4 = r({ x: x - s,          y: y - s });

          return `
            <path d="M ${s1.x} ${s1.y} L ${s2.x} ${s2.y} L ${s3.x} ${s3.y} L ${s4.x} ${s4.y} Z"
              fill="none" stroke="#8a9e7a" stroke-width="1.5" stroke-dasharray="8 6" />
            <path d="M ${rp1.x} ${rp1.y} L ${rp2.x} ${rp2.y} L ${rp3.x} ${rp3.y} L ${rp4.x} ${rp4.y} Z"
              fill="none" stroke="#5c5044" stroke-width="2" />
            <text x="${labelX}" y="${labelY + 5}" text-anchor="middle" fill="#5c5044" font-size="12">${name}</text>
          `;
        }

        let curX = startX;
        let curY = wbTop + wbHeight;
        let result = "";

        pieces.forEach((piece) => {
          result += drawPiece(curX, wbTop, piece.width, wbHeight, piece.angle, piece.name);
          const origin = { x: curX, y: curY };
          const endPt = rotatePoint(curX + piece.width, curY, origin.x, origin.y, piece.angle);

          function rotatePoint(px, py, ox, oy, deg) {
            const a = deg * Math.PI / 180;
            const dx = px - ox, dy = py - oy;
            return { x: ox + dx * Math.cos(a) - dy * Math.sin(a), y: oy + dx * Math.sin(a) + dy * Math.cos(a) };
          }

          curX = endPt.x + pieceGap;
          curY = endPt.y;
        });

        return `
          <text x="${startX}" y="${wbTop - 10}" fill="#5c5044" font-size="15">Pretina anatómica</text>
          ${result}
        `;
      }

      // ── skirt pieces below waistband ──────────────────────────────────
      const wbBottom = 30 + pretina * scale + 60; // top padding + waistband + gap

      function skirtPiece(x0, y0, mirror = false, title = "DELANTERO") {
        const dir = mirror ? -1 : 1;

        const B  = { x: x0,                                          y: y0 };
        const O  = { x: x0 + dir * (cintura / 8) * scale,            y: y0 };
        const O2 = { x: O.x + dir * 3 * scale,                       y: y0 };
        const M  = { x: O2.x + dir * (cintura / 8) * scale,          y: y0 };

        const K  = { x: x0,                                          y: y0 + alto * scale };
        const L  = { x: x0 + dir * (cintura / 8 + 1.5) * scale,      y: y0 + alto * scale };
        const J  = { x: x0 + dir * (cadera / 4) * scale,             y: y0 + alto * scale };

        const P  = { x: x0,                                          y: y0 + largo * scale };
        const R  = { x: x0 + dir * (cadera / 4) * scale,             y: y0 + largo * scale };

        const curveCtrl = { x: J.x + dir * 12, y: J.y + 35 };

        const minX = Math.min(B.x, M.x, J.x, R.x);
        const maxX = Math.max(B.x, M.x, J.x, R.x);

        return `
          <text x="${(minX + maxX) / 2}" y="${y0 - 12}" text-anchor="middle" fill="#5c5044" font-size="15">${title}</text>

          <!-- seam allowance — dashed green -->
          <path d="
            M ${B.x - dir * seam} ${B.y - seam}
            L ${M.x + dir * seam} ${M.y - seam}
            Q ${curveCtrl.x + dir * seam} ${curveCtrl.y} ${J.x + dir * seam} ${J.y}
            L ${R.x + dir * seam} ${R.y + seam}
            L ${P.x - dir * seam} ${P.y + seam}
            Z"
            fill="none" stroke="#8a9e7a" stroke-width="1.5" stroke-dasharray="8 6" />

          <!-- cut line — solid dark -->
          <path d="
            M ${B.x} ${B.y}
            L ${P.x} ${P.y}
            L ${R.x} ${R.y}
            L ${J.x} ${J.y}
            Q ${curveCtrl.x} ${curveCtrl.y} ${M.x} ${M.y}
            L ${B.x} ${B.y}
            Z"
            fill="none" stroke="#5c5044" stroke-width="2" />

          <!-- hip reference — dashed gray -->
          <line x1="${K.x}" y1="${K.y}" x2="${J.x}" y2="${J.y}"
            stroke="#979187" stroke-width="1" stroke-dasharray="5 4" />

          <!-- darts -->
          <line x1="${O.x}"  y1="${B.y}" x2="${L.x}" y2="${L.y}" stroke="#5c5044" stroke-width="1.2" />
          <line x1="${O2.x}" y1="${B.y}" x2="${L.x}" y2="${L.y}" stroke="#5c5044" stroke-width="1.2" />

          ${drawDot(B)} ${drawDot(O)} ${drawDot(O2)} ${drawDot(M)}
          ${drawDot(K)} ${drawDot(L)} ${drawDot(J)}
          ${drawDot(P)} ${drawDot(R)}
        `;
      }

      patternPreview.innerHTML = `
        ${anatomicalWaistband()}
        ${skirtPiece(90,  wbBottom, false, "DELANTERO")}
        ${skirtPiece(500, wbBottom, true,  "TRASERO")}
        <text x="400" y="870" text-anchor="middle" fill="#979187" font-size="13">
          Línea café = corte · línea verde = margen de costura 1 cm
        </text>
      `;

      document.getElementById("pdfButton").style.display = "block";
    }

    function drawBodice() {
      patternPreview.innerHTML = `
        <text x="400" y="450" text-anchor="middle" fill="#979187" font-size="20">Cuerpo básico próximamente</text>
      `;
    }

    function downloadPatternPDF() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      const pageWidth = 210, pageHeight = 297, margin = 20;
      const printableWidth = pageWidth - margin * 2;
      const printableHeight = pageHeight - margin * 2;
      pdf.setDrawColor(210, 210, 210);
      pdf.setLineWidth(0.2);
      pdf.rect(margin, margin, printableWidth, printableHeight);
      pdf.setFontSize(10);
      pdf.setTextColor(90, 80, 68);
      pdf.text("Falda básica - El Desastre", margin, 12);
      pdf.setDrawColor(90, 80, 68);
      pdf.rect(margin, pageHeight - margin - 50, 50, 50);
      pdf.setFontSize(8);
      pdf.text("5 cm x 5 cm", margin, pageHeight - margin - 53);
      pdf.save("falda-basica-a4.pdf");
    }
  </script>

</body>
</html>
