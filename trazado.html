<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constructor de Patrones — El Desastre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #e9e5e5;
      --light: #c6cac7;
      --contrast: #979187;
      --primary: #768067;
      --text: #5c5044;
      --white: #f5f3f0;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 300; }
    a { color: inherit; text-decoration: none; }

    .top-bar { background: var(--primary); height: 36px; }

    .nav {
      height: 60px; display: flex; align-items: center;
      padding: 0 2.5rem; border-bottom: 1px solid var(--contrast);
    }
    .nav-logo { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: 0.14em; text-transform: uppercase; margin-right: auto; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--contrast); }
    .nav-links a:hover { color: var(--text); }

    .page-header { padding: 3rem 2.5rem 1rem; text-align: center; }
    .page-header h1 { font-family: var(--font-display); font-size: clamp(3rem, 8vw, 6rem); font-weight: 300; color: var(--primary); }
    .page-header p { max-width: 620px; margin: 0.8rem auto 0; line-height: 1.6; }

    .selector-area {
      display: grid; grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 1rem; max-width: 900px; margin: 2rem auto; padding: 0 2.5rem;
    }
    .selector-box { background: var(--white); padding: 1.5rem; border-radius: 18px; border: 1px solid rgba(92,80,68,0.08); }
    .selector-box label { display: block; font-family: var(--font-display); font-size: 1.7rem; font-style: italic; font-weight: 300; margin-bottom: 0.8rem; }

    select {
      width: 100%; appearance: none; -webkit-appearance: none;
      padding: 0.9rem 2.8rem 0.9rem 1.2rem;
      border: 1px solid var(--contrast); border-radius: 999px;
      background-color: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 1.2rem; font-style: italic;
      cursor: pointer; outline: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--primary) 50%), linear-gradient(135deg, var(--primary) 50%, transparent 50%);
      background-position: calc(100% - 22px) center, calc(100% - 15px) center;
      background-size: 7px 7px, 7px 7px; background-repeat: no-repeat;
    }

    .pattern-card {
      display: none; max-width: 1100px; margin: 2rem auto 4rem;
      padding: 2rem; background: var(--white); border-radius: 22px; border: 1px solid var(--light);
    }
    .pattern-card.active { display: block; }
    .pattern-title { font-family: var(--font-display); font-size: 2.5rem; font-weight: 300; color: var(--primary); margin-bottom: 1.5rem; }

    .pattern-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; align-items: start; }

    .measurements { background: var(--bg); border-radius: 18px; padding: 1.4rem; }
    .measurements h3, .preview h3 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 300; margin-bottom: 1rem; }

    .measurement-row { display: grid; grid-template-columns: 1fr 90px; gap: 0.7rem; align-items: center; margin-bottom: 0.8rem; }
    .measurement-row input { width: 100%; padding: 0.55rem; border: 1px solid var(--contrast); border-radius: 12px; background: var(--white); }

    .trace-btn {
      width: 100%; margin-top: 1rem; padding: 0.8rem 1rem; border: none;
      border-radius: 22px; background: var(--text); color: var(--bg);
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
    }
    .trace-btn + .trace-btn { margin-top: 0.5rem; }

    .preview { background: var(--light); border-radius: 18px; padding: 1.4rem; }
    .pattern-preview {
      width: 100%; height: 700px; background: var(--white);
      border-radius: 14px; border: 1px dashed var(--contrast);
    }

    .legend { margin-top: 0.8rem; display: flex; gap: 1.5rem; font-size: 0.75rem; color: var(--contrast); }
    .legend span { display: flex; align-items: center; gap: 0.4rem; }
    .legend-line { display: inline-block; width: 24px; height: 2px; }

    @media (max-width: 800px) {
      .selector-area, .pattern-content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">El Desastre</a>
    <ul class="nav-links">
      <li><a href="sobre.html">About</a></li>
      <li><a href="aprender.html">Learning</a></li>
      <li><a href="portafolio.html">Portfolio</a></li>
      <li><a href="patrones.html">Patterns</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <h1>Constructor de patrones</h1>
    <p>Selecciona una base, ingresa las medidas necesarias y traza un patrón inicial.</p>
  </header>

  <section class="selector-area">
    <div class="selector-box">
      <label for="topSelect">Prendas superiores</label>
      <select id="topSelect">
        <option value="">Seleccionar</option>
        <option value="bodice">Cuerpo básico</option>
      </select>
    </div>
    <div class="selector-box">
      <label for="bottomSelect">Prendas inferiores</label>
      <select id="bottomSelect">
        <option value="">Seleccionar</option>
        <option value="skirt">Falda básica</option>
      </select>
    </div>
  </section>

  <section id="patternCard" class="pattern-card">
    <h2 id="patternTitle" class="pattern-title">Seleccione un patrón</h2>
    <div class="pattern-content">
      <div class="measurements">
        <h3>Medidas necesarias</h3>
        <div id="measurementList"></div>
        <button class="trace-btn" onclick="drawPattern()">Trazar patrón</button>
        <button id="pdfButton" class="trace-btn" onclick="downloadPatternPDF()" style="display:none">Descargar PDF A4</button>
      </div>
      <div class="preview">
        <h3>Vista del patrón</h3>
        <svg id="patternPreview" class="pattern-preview" viewBox="0 0 700 900" preserveAspectRatio="xMidYMid meet">
          <text x="350" y="450" text-anchor="middle" fill="#979187" font-size="18">Aquí aparecerá el patrón</text>
        </svg>
        <div class="legend">
          <span><span class="legend-line" style="background:#5c5044"></span> Línea de corte</span>
          <span><span class="legend-line" style="background:#8a9e7a; border-top: 2px dashed #8a9e7a; height:0"></span> Margen de costura 1cm</span>
        </div>
      </div>
    </div>
  </section>

  <script>
    const topSelect      = document.getElementById("topSelect");
    const bottomSelect   = document.getElementById("bottomSelect");
    const patternCard    = document.getElementById("patternCard");
    const patternTitle   = document.getElementById("patternTitle");
    const measurementList = document.getElementById("measurementList");
    const patternPreview = document.getElementById("patternPreview");

    const patterns = {
      bodice: { title: "Cuerpo básico", measurements: ["Busto", "Cintura", "Contorno de cuello"] },
      skirt:  { title: "Falda básica",  measurements: ["Contorno cintura","Contorno cadera","Alto cadera","Largo de falda","Pretina"] }
    };

    const ids = {
      "Contorno cintura": "cintura",
      "Contorno cadera":  "cadera",
      "Alto cadera":      "alto",
      "Largo de falda":   "largo",
      "Pretina":          "pretina"
    };

    function showPattern(type) {
      if (!type) return;
      const p = patterns[type];
      patternCard.classList.add("active");
      patternTitle.textContent = p.title;
      measurementList.innerHTML = "";
      document.getElementById("pdfButton").style.display = "none";
      p.measurements.forEach(m => {
        const row = document.createElement("div");
        row.className = "measurement-row";
        const id = ids[m] || m.toLowerCase().replaceAll(" ", "-");
        row.innerHTML = `<label>${m}</label><input id="${id}" type="number" placeholder="cm">`;
        measurementList.appendChild(row);
      });
      patternPreview.innerHTML = `<text x="350" y="450" text-anchor="middle" fill="#979187" font-size="18">Presiona "Trazar patrón"</text>`;
    }

    topSelect.addEventListener("change",    function(){ bottomSelect.value = ""; showPattern(this.value); });
    bottomSelect.addEventListener("change", function(){ topSelect.value = "";    showPattern(this.value); });

    function drawPattern() {
      if (bottomSelect.value === "skirt") { drawSkirt(); return; }
      if (topSelect.value   === "bodice") { drawBodice(); return; }
    }

    // ── helpers ──────────────────────────────────────────────────────────
    function dot(p, color="#768067") {
      return `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="${color}"/>`;
    }

    function seam(points, close=true) {
      // build a dashed outline 5px outside the given polygon
      const s = 5;
      // simple offset: expand each point away from centroid
      const cx = points.reduce((a,p)=>a+p.x,0)/points.length;
      const cy = points.reduce((a,p)=>a+p.y,0)/points.length;
      const expanded = points.map(p => {
        const dx = p.x - cx, dy = p.y - cy;
        const len = Math.sqrt(dx*dx+dy*dy) || 1;
        return { x: p.x + (dx/len)*s, y: p.y + (dy/len)*s };
      });
      const d = expanded.map((p,i)=>(i===0?`M ${p.x} ${p.y}`:`L ${p.x} ${p.y}`)).join(" ") + (close?" Z":"");
      return `<path d="${d}" fill="none" stroke="#8a9e7a" stroke-width="1.5" stroke-dasharray="7 5"/>`;
    }

    // ── main skirt drawing ────────────────────────────────────────────────
    function drawSkirt() {
      const cintura = Number(document.getElementById("cintura").value);
      const cadera  = Number(document.getElementById("cadera").value);
      const alto    = Number(document.getElementById("alto").value);
      const largo   = Number(document.getElementById("largo").value);
      const pretina = Number(document.getElementById("pretina").value);

      if (!cintura||!cadera||!alto||!largo||!pretina) {
        alert("Por favor ingresa todas las medidas."); return;
      }

      // scale so the skirt fits nicely in the viewBox
      // viewBox is 700 wide, 900 tall
      // skirt piece width = cadera/4, height = largo
      // waistband height at top ~80px, padding ~20px each side
      const availW = 300; // each piece gets ~300px wide
      const availH = 580; // skirt body height area
      const scaleW = availW / (cadera / 4);
      const scaleH = availH / largo;
      const sc     = Math.min(scaleW, scaleH, 6); // cap at 6px/cm

      const sm = 1 * sc; // 1cm seam allowance in px

      // ── construct one skirt piece ──────────────────────────────────────
      // origin x0,y0 = top-left corner (point B)
      // dir = 1 for front (left to right), -1 for back (right to left mirror)
      function buildPiece(x0, y0, dir) {

        // Row 1 — waist line
        const B  = { x: x0,                                         y: y0 };
        const O  = { x: x0 + dir*(cintura/8)*sc,                    y: y0 };
        const O2 = { x: O.x  + dir*3*sc,                            y: y0 };
        const M  = { x: O2.x + dir*(cintura/8)*sc,                  y: y0 };

        // Row 2 — hip line  (B-K vertical, distance = alto)
        const K  = { x: x0,                                         y: y0 + alto*sc };
        const L  = { x: x0 + dir*(cintura/8 + 1.5)*sc,              y: y0 + alto*sc };
        const J  = { x: x0 + dir*(cadera/4)*sc,                     y: y0 + alto*sc };

        // Row 3 — hem line  (B-P vertical, distance = largo)
        const P  = { x: x0,                                         y: y0 + largo*sc };
        const R  = { x: x0 + dir*(cadera/4)*sc,                     y: y0 + largo*sc };

        // pretina cut line (horizontal at pretina depth from waist)
        const Bw = { x: x0,    y: y0 + pretina*sc };   // on left edge
        const Ow = { x: O.x,   y: y0 + pretina*sc };   // under O  (dart left)
        const O2w= { x: O2.x,  y: y0 + pretina*sc };   // under O2 (dart right)
        const Mw = { x: M.x,   y: y0 + pretina*sc };   // under M  (side seam)

        // hip curve control point (between M/J)
        const ctrl = { x: M.x + dir*8, y: M.y + (J.y-M.y)*0.4 };

        return { B,O,O2,M, K,L,J, P,R, Bw,Ow,O2w,Mw, ctrl };
      }

      // ── SVG for one skirt piece ────────────────────────────────────────
      function svgPiece(pts, label) {
        const { B,O,O2,M, K,L,J, P,R, Bw,Ow,O2w,Mw, ctrl } = pts;

        // waistband area fill (red-ish)
        const wbFill = `
          <path d="
            M ${B.x} ${B.y}
            L ${M.x} ${M.y}
            Q ${ctrl.x} ${ctrl.y} ${J.x} ${J.y}
            L ${Mw.x} ${Mw.y}
            Q ${ctrl.x} ${ctrl.y + pretina*sc*0.3} ${O2w.x} ${O2w.y}
            L ${Ow.x} ${Ow.y}
            L ${Bw.x} ${Bw.y}
            Z"
            fill="rgba(150,80,80,0.25)" stroke="none"/>
        `;

        // full outer cut line
        const outline = `
          <path d="
            M ${B.x} ${B.y}
            L ${P.x} ${P.y}
            L ${R.x} ${R.y}
            L ${J.x} ${J.y}
            Q ${ctrl.x} ${ctrl.y} ${M.x} ${M.y}
            L ${B.x} ${B.y}
            Z"
            fill="none" stroke="#5c5044" stroke-width="2"/>
        `;

        // pretina cut line (horizontal dashed across piece)
        const pretinaCut = `
          <line x1="${Bw.x}" y1="${Bw.y}" x2="${Mw.x}" y2="${Mw.y}"
            stroke="#5c5044" stroke-width="1.5" stroke-dasharray="5 3"/>
        `;

        // darts — from waist down to L (dart tip)
        const darts = `
          <line x1="${O.x}"  y1="${O.y}"  x2="${L.x}" y2="${L.y}" stroke="#5c5044" stroke-width="1.2"/>
          <line x1="${O2.x}" y1="${O2.y}" x2="${L.x}" y2="${L.y}" stroke="#5c5044" stroke-width="1.2"/>
        `;

        // hip reference line
        const hipLine = `
          <line x1="${K.x}" y1="${K.y}" x2="${J.x}" y2="${J.y}"
            stroke="#979187" stroke-width="1" stroke-dasharray="5 4"/>
        `;

        // seam allowance outline
        const seamPath = seam([B, M, J, R, P], true);

        // label
        const lx = (B.x + J.x) / 2;
        const labelSvg = `<text x="${lx}" y="${B.y - 14}" text-anchor="middle" fill="#5c5044" font-size="13" font-family="DM Sans, sans-serif">${label}</text>`;

        // dots
        const dots = [B,O,O2,M,K,L,J,P,R].map(p=>dot(p)).join("");

        return wbFill + seamPath + outline + pretinaCut + darts + hipLine + dots + labelSvg;
      }

      // ── assembled waistband at top ─────────────────────────────────────
      function svgWaistband() {
        // The waistband is made of the 4 cut-off top sections assembled side by side
        // Front: left-of-dart piece + right-of-dart piece
        // Back:  same (mirrored)
        // We show them as a curved band by rotating each segment slightly

        const wbH  = pretina * sc;
        const startX = 30;
        const startY = 20;

        // piece widths (from the pattern construction)
        const w1 = (cintura/8)*sc;         // B to O
        const w2 = (cintura/8 + 1.5)*sc;   // O2 to L-ish  (wider piece)
        const w3 = (cintura/8)*sc;          // back B to O
        const w4 = (cintura/8 + 1.5)*sc;   // back wider

        const gap = 2;
        const pieces = [
          { w: w1, angle: -10,  label: "D1" },
          { w: w2, angle: -5,   label: "D2" },
          { w: w3, angle:  5,   label: "T1" },
          { w: w4, angle:  10,  label: "T2" },
        ];

        function rotatePt(px,py,ox,oy,deg) {
          const a = deg*Math.PI/180;
          const dx=px-ox, dy=py-oy;
          return { x: ox+dx*Math.cos(a)-dy*Math.sin(a), y: oy+dx*Math.sin(a)+dy*Math.cos(a) };
        }

        let curX = startX, curY = startY + wbH;
        let svg = `<text x="${startX}" y="${startY - 8}" fill="#5c5044" font-size="13" font-family="DM Sans,sans-serif">Pretina anatómica</text>`;

        pieces.forEach(piece => {
          const orig = { x: curX, y: curY };
          // corners before rotation
          const tl = { x: curX,           y: curY - wbH };
          const tr = { x: curX+piece.w,   y: curY - wbH };
          const br = { x: curX+piece.w,   y: curY        };
          const bl = { x: curX,           y: curY        };

          const r = p => rotatePt(p.x,p.y,orig.x,orig.y,piece.angle);
          const rtl=r(tl), rtr=r(tr), rbr=r(br), rbl=r(bl);

          // seam
          const s=sm;
          const stl=r({x:curX-s,        y:curY-wbH-s});
          const str=r({x:curX+piece.w+s, y:curY-wbH-s});
          const sbr=r({x:curX+piece.w+s, y:curY+s});
          const sbl=r({x:curX-s,         y:curY+s});

          svg += `
            <path d="M ${stl.x} ${stl.y} L ${str.x} ${str.y} L ${sbr.x} ${sbr.y} L ${sbl.x} ${sbl.y} Z"
              fill="none" stroke="#8a9e7a" stroke-width="1.5" stroke-dasharray="7 5"/>
            <path d="M ${rtl.x} ${rtl.y} L ${rtr.x} ${rtr.y} L ${rbr.x} ${rbr.y} L ${rbl.x} ${rbl.y} Z"
              fill="none" stroke="#5c5044" stroke-width="2"/>
            <text x="${(rtl.x+rtr.x+rbr.x+rbl.x)/4}" y="${(rtl.y+rtr.y+rbr.y+rbl.y)/4+5}"
              text-anchor="middle" fill="#5c5044" font-size="10" font-family="DM Sans,sans-serif">${piece.label}</text>
          `;

          // advance curX to top-right corner rotated
          const nextOrigin = rotatePt(curX+piece.w, curY, orig.x, orig.y, piece.angle);
          curX = nextOrigin.x + gap;
          curY = nextOrigin.y;
        });

        return svg;
      }

      // ── layout ────────────────────────────────────────────────────────
      const wbAreaHeight = pretina*sc + 60; // waistband + gap below it

      // front piece: origin top-left
      const frontX = 30;
      const frontY = wbAreaHeight + 30;
      const frontPts = buildPiece(frontX, frontY, 1);

      // back piece: mirror, place to the right
      // back width = cadera/4 * sc
      const pieceW  = (cadera/4)*sc;
      const backX   = frontX + pieceW + 40;
      const backY   = frontY;
      const backPts = buildPiece(backX + pieceW, backY, -1); // start from right edge, go left

      const svgContent = `
        ${svgWaistband()}
        ${svgPiece(frontPts, "DELANTERO")}
        ${svgPiece(backPts,  "TRASERO")}
      `;

      patternPreview.innerHTML = svgContent;
      document.getElementById("pdfButton").style.display = "block";
    }

    function drawBodice() {
      patternPreview.innerHTML = `<text x="350" y="450" text-anchor="middle" fill="#979187" font-size="18">Cuerpo básico próximamente</text>`;
    }

    function downloadPatternPDF() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      const margin=20, pw=210-margin*2, ph=297-margin*2;
      pdf.setDrawColor(210,210,210); pdf.setLineWidth(0.2); pdf.rect(margin,margin,pw,ph);
      pdf.setFontSize(10); pdf.setTextColor(90,80,68);
      pdf.text("Falda básica — El Desastre", margin, 12);
      pdf.setDrawColor(90,80,68);
      pdf.rect(margin, 297-margin-50, 50, 50);
      pdf.setFontSize(8); pdf.text("5 cm × 5 cm", margin, 297-margin-53);
      pdf.save("falda-basica-a4.pdf");
    }
  </script>
</body>
</html>
