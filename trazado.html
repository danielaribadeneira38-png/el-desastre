<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constructor de Patrones — El Desastre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #e9e5e5;
      --light: #c6cac7;
      --contrast: #979187;
      --primary: #768067;
      --text: #5c5044;
      --white: #f5f3f0;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 300; }
    a { color: inherit; text-decoration: none; }
    .top-bar { background: var(--primary); height: 36px; }
    .nav { height: 60px; display: flex; align-items: center; padding: 0 2.5rem; border-bottom: 1px solid var(--contrast); }
    .nav-logo { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: 0.14em; text-transform: uppercase; margin-right: auto; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--contrast); }
    .nav-links a:hover { color: var(--text); }
    .page-header { padding: 3rem 2.5rem 1rem; text-align: center; }
    .page-header h1 { font-family: var(--font-display); font-size: clamp(3rem, 8vw, 6rem); font-weight: 300; color: var(--primary); }
    .page-header p { max-width: 620px; margin: 0.8rem auto 0; line-height: 1.6; }
    .selector-area { display: grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap: 1rem; max-width: 900px; margin: 2rem auto; padding: 0 2.5rem; }
    .selector-box { background: var(--white); padding: 1.5rem; border-radius: 18px; border: 1px solid rgba(92,80,68,0.08); }
    .selector-box label { display: block; font-family: var(--font-display); font-size: 1.7rem; font-style: italic; font-weight: 300; margin-bottom: 0.8rem; }
    select { width: 100%; appearance: none; -webkit-appearance: none; padding: 0.9rem 2.8rem 0.9rem 1.2rem; border: 1px solid var(--contrast); border-radius: 999px; background-color: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 1.2rem; font-style: italic; cursor: pointer; outline: none; background-image: linear-gradient(45deg, transparent 50%, var(--primary) 50%), linear-gradient(135deg, var(--primary) 50%, transparent 50%); background-position: calc(100% - 22px) center, calc(100% - 15px) center; background-size: 7px 7px, 7px 7px; background-repeat: no-repeat; }
    .pattern-card { display: none; max-width: 1200px; margin: 2rem auto 4rem; padding: 2rem; background: var(--white); border-radius: 22px; border: 1px solid var(--light); }
    .pattern-card.active { display: block; }
    .pattern-title { font-family: var(--font-display); font-size: 2.5rem; font-weight: 300; color: var(--primary); margin-bottom: 1.5rem; }
    .pattern-content { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; align-items: start; }
    .measurements { background: var(--bg); border-radius: 18px; padding: 1.4rem; }
    .measurements h3 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 300; margin-bottom: 1rem; }
    .measurement-row { display: grid; grid-template-columns: 1fr 80px; gap: 0.7rem; align-items: center; margin-bottom: 0.8rem; }
    .measurement-row label { font-size: 0.85rem; }
    .measurement-row input { width: 100%; padding: 0.55rem; border: 1px solid var(--contrast); border-radius: 12px; background: var(--white); font-family: var(--font-body); }
    .trace-btn { width: 100%; margin-top: 1rem; padding: 0.8rem 1rem; border: none; border-radius: 22px; background: var(--text); color: var(--bg); font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; font-family: var(--font-body); }
    .trace-btn + .trace-btn { margin-top: 0.5rem; background: var(--contrast); }
    .preview { background: var(--light); border-radius: 18px; padding: 1.4rem; }
    .preview h3 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 300; margin-bottom: 1rem; }
    .pattern-preview { width: 100%; background: var(--white); border-radius: 14px; border: 1px dashed var(--contrast); display: block; }
    .legend { margin-top: 0.8rem; display: flex; gap: 1.5rem; font-size: 0.75rem; color: var(--contrast); flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 0.5rem; }
    .legend-solid { display: inline-block; width: 24px; height: 2px; background: #8a9e7a; }
    .legend-dashed { display: inline-block; width: 24px; height: 0; border-top: 2px dashed #5c5044; }
    @media (max-width: 800px) { .selector-area, .pattern-content { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="top-bar"></div>
  <nav class="nav">
    <a href="index.html" class="nav-logo">El Desastre</a>
    <ul class="nav-links">
      <li><a href="sobre.html">About</a></li>
      <li><a href="aprender.html">Learning</a></li>
      <li><a href="portafolio.html">Portfolio</a></li>
      <li><a href="patrones.html">Patterns</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <h1>Constructor de patrones</h1>
    <p>Selecciona una base, ingresa las medidas y traza tu patrón.</p>
  </header>

  <section class="selector-area">
    <div class="selector-box">
      <label for="topSelect">Prendas superiores</label>
      <select id="topSelect">
        <option value="">Seleccionar</option>
        <option value="bodice">Cuerpo básico</option>
      </select>
    </div>
    <div class="selector-box">
      <label for="bottomSelect">Prendas inferiores</label>
      <select id="bottomSelect">
        <option value="">Seleccionar</option>
        <option value="skirt">Falda básica</option>
      </select>
    </div>
  </section>

  <section id="patternCard" class="pattern-card">
    <h2 id="patternTitle" class="pattern-title">Seleccione un patrón</h2>
    <div class="pattern-content">
      <div class="measurements">
        <h3>Medidas</h3>
        <div id="measurementList"></div>
        <button class="trace-btn" onclick="drawPattern()">Trazar patrón</button>
        <button id="pdfButton" class="trace-btn" style="display:none">Descargar PDF</button>
      </div>
      <div class="preview">
        <h3>Vista del patrón</h3>
        <svg id="patternPreview" class="pattern-preview" viewBox="0 0 900 1000" preserveAspectRatio="xMidYMid meet">
          <text x="450" y="500" text-anchor="middle" fill="#979187" font-size="20">Aquí aparecerá el patrón</text>
        </svg>
        <div class="legend">
          <span><span class="legend-dashed"></span> Línea de corte</span>
          <span><span class="legend-solid"></span> Margen de costura 1 cm</span>
        </div>
      </div>
    </div>
  </section>

  <script>
    const topSelect       = document.getElementById("topSelect");
    const bottomSelect    = document.getElementById("bottomSelect");
    const patternCard     = document.getElementById("patternCard");
    const patternTitle    = document.getElementById("patternTitle");
    const measurementList = document.getElementById("measurementList");
    const patternPreview  = document.getElementById("patternPreview");

    const patterns = {
      bodice: { title: "Cuerpo básico", measurements: ["Busto","Cintura","Contorno de cuello"] },
      skirt:  { title: "Falda básica",  measurements: ["Contorno cintura","Contorno cadera","Alto cadera","Largo de falda","Pretina"] }
    };
    const ids = {
      "Contorno cintura": "cintura",
      "Contorno cadera":  "cadera",
      "Alto cadera":      "alto",
      "Largo de falda":   "largo",
      "Pretina":          "pretina"
    };

    function showPattern(type) {
      if (!type) return;
      const p = patterns[type];
      patternCard.classList.add("active");
      patternTitle.textContent = p.title;
      measurementList.innerHTML = "";
      document.getElementById("pdfButton").style.display = "none";
      p.measurements.forEach(m => {
        const row = document.createElement("div");
        row.className = "measurement-row";
        const id = ids[m] || m.toLowerCase().replaceAll(" ","-");
        row.innerHTML = `<label>${m}</label><input id="${id}" type="number" placeholder="cm">`;
        measurementList.appendChild(row);
      });
      patternPreview.innerHTML = `<text x="450" y="500" text-anchor="middle" fill="#979187" font-size="20">Presiona "Trazar patrón"</text>`;
    }

    topSelect.addEventListener("change",    function(){ bottomSelect.value=""; showPattern(this.value); });
    bottomSelect.addEventListener("change", function(){ topSelect.value="";    showPattern(this.value); });

    function drawPattern() {
      if (bottomSelect.value==="skirt")  { drawSkirt();  return; }
      if (topSelect.value==="bodice")    { drawBodice(); return; }
    }

    // ── utility ──────────────────────────────────────────────────────────
    function dot(p) {
      return `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#768067"/>`;
    }

    function moveTowards(p1, p2, dist) {
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len === 0) return { ...p1 };
      return { x: p1.x + (dx/len)*dist, y: p1.y + (dy/len)*dist };
    }

    function offsetPolygon(pts, amount) {
      const n = pts.length;
      return pts.map((p, i) => {
        const prev = pts[(i - 1 + n) % n];
        const next = pts[(i + 1) % n];
        const ax = p.x - prev.x, ay = p.y - prev.y;
        const bx = next.x - p.x, by = next.y - p.y;
        const na = { x: ay, y: -ax };
        const nb = { x: by, y: -bx };
        const la = Math.sqrt(na.x*na.x + na.y*na.y) || 1;
        const lb = Math.sqrt(nb.x*nb.x + nb.y*nb.y) || 1;
        const miter = { x: (na.x/la + nb.x/lb), y: (na.y/la + nb.y/lb) };
        const ml = Math.sqrt(miter.x*miter.x + miter.y*miter.y) || 1;
        return { x: p.x + (miter.x/ml)*amount, y: p.y + (miter.y/ml)*amount };
      });
    }

    function polyPath(pts, close=true) {
      return pts.map((p,i) => (i===0 ? `M ${p.x.toFixed(1)} ${p.y.toFixed(1)}` : `L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`)).join(" ") + (close ? " Z" : "");
    }

    // seam allowance = solid green
    function seamPath(pts) {
      const off = offsetPolygon(pts, 7);
      return `<path d="${polyPath(off)}" fill="none" stroke="#8a9e7a" stroke-width="1.4"/>`;
    }

    // drafted pattern line = dashed dark
    function draftPath(d) {
      return `<path d="${d}" fill="none" stroke="#5c5044" stroke-width="2" stroke-dasharray="7 5"/>`;
    }

    function draftLine(x1, y1, x2, y2, width="2") {
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#5c5044" stroke-width="${width}" stroke-dasharray="7 5"/>`;
    }

    // ── SKIRT ─────────────────────────────────────────────────────────────
    function drawSkirt() {
      const cintura = Number(document.getElementById("cintura").value);
      const cadera  = Number(document.getElementById("cadera").value);
      const alto    = Number(document.getElementById("alto").value);
      const largo   = Number(document.getElementById("largo").value);
      const pretina = Number(document.getElementById("pretina").value);

      if (!cintura||!cadera||!alto||!largo||!pretina) {
        alert("Por favor ingresa todas las medidas."); return;
      }

      const pieceWidthCm  = cadera / 4;
      const pieceHeightCm = largo - pretina;
      const maxW = 380;
      const maxH = 580;
      const sc   = Math.min(maxW / pieceWidthCm, maxH / pieceHeightCm, 7);

      function buildSkirtPoints(x0, y0, dir) {
        const B  = { x: x0,                              y: y0 - pretina*sc };
        const O  = { x: x0 + dir*(cintura/8)*sc,         y: y0 - pretina*sc };
        const O2 = { x: O.x + dir*3*sc,                  y: y0 - pretina*sc };
        const M  = { x: O2.x + dir*(cintura/8)*sc,       y: y0 - pretina*sc };

        const K  = { x: x0,                              y: y0 + (alto - pretina)*sc };
        const L  = { x: x0 + dir*(cintura/8 + 1.5)*sc,  y: y0 + (alto - pretina)*sc };
        const J  = { x: x0 + dir*(cadera/4)*sc,         y: y0 + (alto - pretina)*sc };

        const P  = { x: x0,                              y: y0 + (largo - pretina)*sc };
        const R  = { x: x0 + dir*(cadera/4)*sc,         y: y0 + (largo - pretina)*sc };

        const B1 = moveTowards(B, K,  pretina*sc);
        const O1 = moveTowards(O, L,  pretina*sc);
        const O3 = moveTowards(O2, L, pretina*sc);
        const M1 = moveTowards(M, J,  pretina*sc);

        return { B, O, O2, M, K, L, J, P, R, B1, O1, O3, M1 };
      }

      function svgSkirtBody(pts, label, labelX) {
        const { B1, O1, O3, M1, K, L, J, P, R } = pts;

        const hipCtrl = {
          x: M1.x + (J.x - M1.x) * 0.3,
          y: M1.y + (J.y - M1.y) * 0.3 + 8
        };

        const bodyPoly = [B1, O1, O3, M1, J, R, P];

        // seam allowance — solid green
        const seam = seamPath(bodyPoly);

        // cut line — dashed dark
        const outline = draftPath(`
          M ${B1.x.toFixed(1)} ${B1.y.toFixed(1)}
          L ${O1.x.toFixed(1)} ${O1.y.toFixed(1)}
          M ${O3.x.toFixed(1)} ${O3.y.toFixed(1)}
          L ${M1.x.toFixed(1)} ${M1.y.toFixed(1)}
          Q ${hipCtrl.x.toFixed(1)} ${hipCtrl.y.toFixed(1)} ${J.x.toFixed(1)} ${J.y.toFixed(1)}
          L ${R.x.toFixed(1)} ${R.y.toFixed(1)}
          L ${P.x.toFixed(1)} ${P.y.toFixed(1)}
          L ${B1.x.toFixed(1)} ${B1.y.toFixed(1)}
          Z`);

        // dart legs — dashed dark
        const darts =
          draftLine(O1.x.toFixed(1), O1.y.toFixed(1), L.x.toFixed(1), L.y.toFixed(1), "1.2") +
          draftLine(O3.x.toFixed(1), O3.y.toFixed(1), L.x.toFixed(1), L.y.toFixed(1), "1.2");

        // hip reference — gray dashed (keep as reference, not a cut line)
        const hipRef = `<line x1="${K.x.toFixed(1)}" y1="${K.y.toFixed(1)}"
          x2="${J.x.toFixed(1)}" y2="${J.y.toFixed(1)}"
          stroke="#979187" stroke-width="1" stroke-dasharray="5 4"/>`;

        const allDots = [B1, O1, O3, M1, K, L, J, P, R].map(dot).join("");
        const lbl = `<text x="${labelX}" y="${B1.y - 14}" text-anchor="middle"
          fill="#5c5044" font-size="13" font-family="DM Sans,sans-serif">${label}</text>`;

        return seam + outline + darts + hipRef + allDots + lbl;
      }

function svgPretina(frontPts) {
  const { B1, O1, O3, M1 } = frontPts;

  const wbTop  = 30;
  const startX = 30;
  const ph     = pretina * sc;
  const segTop = (cintura / 8) * sc; // top of each piece = cintura/8

  // Bottom lengths — actual distances along the cut lines on the skirt
  const botLen_BO  = Math.sqrt((O1.x-B1.x)**2 + (O1.y-B1.y)**2); // B1→O1 (left piece)
  const botLen_O2M = Math.sqrt((M1.x-O3.x)**2 + (M1.y-O3.y)**2); // O3→M1 (right piece)

  // Each piece: top wider than bottom, difference split equally on each side
  // This taper is what creates the curve when the 4 pieces are joined
  function makePiece(startX, topLen, botLen) {
    const offset = (topLen - botLen) / 2;
    return {
      TL: { x: startX,          y: wbTop      },  // top left
      TR: { x: startX + topLen, y: wbTop      },  // top right
      BL: { x: startX + offset, y: wbTop + ph },  // bottom left
      BR: { x: startX + topLen - offset, y: wbTop + ph }  // bottom right
    };
  }

  const gap = 8; // small gap between pieces

  // 4 pieces: front-left, front-right, back-left, back-right
  const p1 = makePiece(startX,                            segTop, botLen_BO);
  const p2 = makePiece(p1.TR.x + gap,                    segTop, botLen_O2M);
  const p3 = makePiece(p2.TR.x + gap,                    segTop, botLen_O2M); // back mirrors front
  const p4 = makePiece(p3.TR.x + gap,                    segTop, botLen_BO);

  const pieces = [p1, p2, p3, p4];
  const labels = ["D1", "D2", "T1", "T2"];

  let svg = `<text x="${(p1.TL.x + p4.TR.x) / 2}" y="${wbTop - 12}"
    text-anchor="middle" fill="#5c5044" font-size="13" font-family="DM Sans,sans-serif">
    Pretina anatómica (½ falda)
  </text>`;

  pieces.forEach((p, i) => {
    const poly = [p.TL, p.TR, p.BR, p.BL];

    // seam allowance — solid green
    svg += seamPath(poly);

    // cut line — dashed dark
    svg += draftPath(`M ${p.TL.x} ${p.TL.y} L ${p.TR.x} ${p.TR.y} L ${p.BR.x} ${p.BR.y} L ${p.BL.x} ${p.BL.y} Z`);

    // label
    const cx = (p.TL.x + p.TR.x) / 2;
    const cy = (p.TL.y + p.BL.y) / 2 + 5;
    svg += `<text x="${cx}" y="${cy}" text-anchor="middle" fill="#5c5044" font-size="11" font-family="DM Sans,sans-serif">${labels[i]}</text>`;

    // dots
    poly.forEach(pt => { svg += dot(pt); });
  });

  return svg;
}

    function drawBodice() {
      patternPreview.innerHTML = `<text x="450" y="500" text-anchor="middle" fill="#979187" font-size="18">Cuerpo básico próximamente</text>`;
    }
  </script>
</body>
</html>
